<!DOCTYPE html>
<html>
<head>
  <title>My Choir</title>

  <!-- Google Fonts for manuscript feel -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel&family=EB+Garamond&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: #111;
      color: #f5f5f5;
      font-family: 'EB Garamond', serif;
    }

    header {
      text-align: center;
      padding: 60px 20px;
      border-bottom: 1px solid #444;
      position: relative;
    }

    header h1 {
      font-family: 'Cinzel', serif;
      font-size: 48px;
      letter-spacing: 2px;
      margin-bottom: 10px;
    }

    header p {
      font-style: italic;
      color: #ccc;
    }

    .button {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      border: 1px solid #fff;
      color: white;
      text-decoration: none;
      transition: 0.3s;
    }

    .button:hover {
      background: white;
      color: black;
    }

    nav {
      text-align: center;
      padding: 15px;
      border-bottom: 1px solid #333;
    }

    nav a {
      color: #ddd;
      margin: 0 15px;
      text-decoration: none;
      font-family: 'Cinzel', serif;
    }

    nav a:hover {
      text-decoration: underline;
    }

    .container {
      max-width: 800px;
      margin: auto;
      padding: 40px 20px;
    }

    h2 {
      font-family: 'Cinzel', serif;
      border-bottom: 1px solid #444;
      padding-bottom: 10px;
      margin-bottom: 20px;
    }

    .news-item {
      padding: 15px 0;
      border-bottom: 1px solid #333;
    }

    /* Decorative manuscript-style divider */
    .divider {
      text-align: center;
      margin: 40px 0;
      font-size: 20px;
      letter-spacing: 5px;
      color: #888;
    }

  </style>
</head>

<body>

<header>
  <h1>My Choir</h1>
  <p>Voices in harmony</p>

  <a class="button" href="https://eventbrite.co.uk" target="_blank">
    Buy Concert Tickets
  </a>
</header>

<nav>
  <a href="index.html">Home</a>
  <a href="about.html">About & Join</a>
</nav>

<div class="container">

  <div class="divider">✶ ✶ ✶</div>

  <h2>Latest News</h2>
  <div id="news"></div>

  <div class="divider">✶ ✶ ✶</div>

</div>

<script src="data/news.js"></script>
<script>
  const newsContainer = document.getElementById("news");

  news.forEach(item => {
    const div = document.createElement("div");
    div.className = "news-item";
    div.innerHTML = `<strong>${item.date}</strong><br>${item.text}`;
    newsContainer.appendChild(div);
  });
</script>

</body>
</html>
