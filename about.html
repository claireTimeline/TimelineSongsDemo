<!DOCTYPE html>
<html>
<head>
  <title>About the Choir</title>

  <link href="https://fonts.googleapis.com/css2?family=Cinzel&family=EB+Garamond&display=swap" rel="stylesheet">

  <style>
    body {
      background: #111;
      color: #f5f5f5;
      font-family: 'EB Garamond', serif;
      max-width: 800px;
      margin: auto;
      padding: 40px 20px;
    }

    h1, h2 {
      font-family: 'Cinzel', serif;
      border-bottom: 1px solid #444;
      padding-bottom: 5px;
    }

    ul {
      line-height: 1.8;
    }

    .section {
      margin-bottom: 40px;
    }

    .divider {
      text-align: center;
      margin: 30px 0;
      color: #888;
      letter-spacing: 5px;
    }
  </style>
</head>

<body>

<h1>About the Choir</h1>

<div class="section">
  <p>We are a welcoming community choir, singing a wide range of music in a friendly and supportive environment.</p>
</div>

<div class="divider">✶ ✶ ✶</div>

<div class="section">
  <h2>Location</h2>
  <p>St Mary's Church Hall, Your Town</p>
</div>

<div class="section">
  <h2>Term Dates</h2>
  <ul id="dates"></ul>
</div>

<script src="data/dates.js"></script>
<script>
  const list = document.getElementById("dates");

  dates.forEach(d => {
    const li = document.createElement("li");
    li.textContent = d;
    list.appendChild(li);
  });
</script>

</body>
</html>
