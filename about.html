<!DOCTYPE html>
<html>
<head>
  <title>About the Choir</title>

  <link href="https://fonts.googleapis.com/css2?family=Cinzel&family=EB+Garamond&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<h1>About the Choir</h1>

<div class="section">
  <p>We are a welcoming community choir, singing a wide range of music in a friendly and supportive environment.</p>
</div>

<div class="divider">✶ ✶ ✶</div>

<div class="section">
  <h2>Location</h2>
  <p>St Barnabas Church Hall, Mill Road, Cambridge</p>
</div>

<div class="section">
  <h2>Term Dates</h2>
  <ul id="dates"></ul>
</div>

<script src="data/dates.js"></script>
<script>
  const list = document.getElementById("dates");

  dates.forEach(d => {
    const li = document.createElement("li");
    li.textContent = d;
    list.appendChild(li);
  });
</script>

</body>
</html>
